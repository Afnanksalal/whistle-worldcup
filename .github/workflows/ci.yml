name: CI

on:
  push:
    branches: [master, main, "feature/**"]
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
      - name: Install
        run: npm ci
      - name: Shared build + unit tests
        run: npm run check
      - name: Web production build and SEO/crawler smoke
        env:
          INTERNAL_API_URL: http://127.0.0.1:4010
          NEXT_PUBLIC_API_URL: http://127.0.0.1:4010
          NEXT_PUBLIC_SITE_URL: https://whistle.example
          NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
          SEO_BASE_URL: http://127.0.0.1:3000
          SEO_EXPECTED_ORIGIN: https://whistle.example
          SEO_FIXTURE_PORT: "4010"
        run: |
          node apps/web/scripts/seo-smoke-fixture-server.mjs > /tmp/whistle-seo-fixture.log 2>&1 &
          FIXTURE_PID=$!
          WEB_PID=""
          cleanup() {
            if [ -n "$WEB_PID" ]; then kill "$WEB_PID" 2>/dev/null || true; fi
            kill "$FIXTURE_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          FIXTURE_READY=false
          for attempt in $(seq 1 20); do
            if curl -sf http://127.0.0.1:4010/health >/dev/null; then
              FIXTURE_READY=true
              break
            fi
            sleep 1
          done
          if [ "$FIXTURE_READY" != "true" ]; then
            cat /tmp/whistle-seo-fixture.log
            exit 1
          fi

          npm run build -w @whistle/web
          npm run start -w @whistle/web -- -p 3000 > /tmp/whistle-web.log 2>&1 &
          WEB_PID=$!

          WEB_READY=false
          for attempt in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ >/dev/null; then
              WEB_READY=true
              break
            fi
            sleep 1
          done
          if [ "$WEB_READY" != "true" ]; then
            cat /tmp/whistle-web.log
            exit 1
          fi

          npm run check:seo

  rust:
    name: Anchor program check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo check
        run: cargo check -p whistle
