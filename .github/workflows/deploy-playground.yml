name: Deploy Playground

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-playground
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Playground VPS
    runs-on: ubuntu-latest
    steps:
      - name: Require secrets
        env:
          KEY: ${{ secrets.PLAYGROUND_SSH_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "PLAYGROUND_SSH_KEY missing — skip deploy"
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.skip != 'true'

      - name: Start SSH agent
        if: env.skip != 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PLAYGROUND_SSH_KEY }}

      - name: Add host key
        if: env.skip != 'true'
        env:
          HOST: ${{ secrets.PLAYGROUND_HOST }}
        run: |
          HOST="${HOST:-ec2-18-61-174-6.ap-south-2.compute.amazonaws.com}"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Remote deploy
        if: env.skip != 'true'
        env:
          HOST: ${{ secrets.PLAYGROUND_HOST }}
          USER: ${{ secrets.PLAYGROUND_USER }}
        run: |
          HOST="${HOST:-ec2-18-61-174-6.ap-south-2.compute.amazonaws.com}"
          USER="${USER:-ubuntu}"
          ssh -o StrictHostKeyChecking=yes "$USER@$HOST" bash -s <<'EOF'
          set -euo pipefail
          REMOTE_DIR=/opt/whistle
          sudo mkdir -p "$REMOTE_DIR"
          sudo chown -R ubuntu:ubuntu "$REMOTE_DIR"
          if [ -d "$REMOTE_DIR/.git" ]; then
            cd "$REMOTE_DIR"
            git fetch origin
            git checkout -f master
            git reset --hard origin/master
          else
            git clone https://github.com/Afnanksalal/whistle-worldcup.git "$REMOTE_DIR"
            cd "$REMOTE_DIR"
          fi
          cd infra/playground
          if [ ! -f .env ]; then
            echo "Missing infra/playground/.env — copy .env.example and set TXLINE_API_TOKEN + ADMIN_API_KEY" >&2
            exit 1
          fi
          grep -q '^TXLINE_API_TOKEN=.\+' .env || { echo "TXLINE_API_TOKEN empty" >&2; exit 1; }
          grep -q '^ADMIN_API_KEY=.\+' .env || { echo "ADMIN_API_KEY empty" >&2; exit 1; }
          docker compose up -d --build
          docker compose --profile tunnel up -d tunnel
          sleep 12
          curl -sf "http://127.0.0.1:8088/api/ready"
          docker logs playground-tunnel-1 2>&1 | grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' | tail -1 || true
          EOF
