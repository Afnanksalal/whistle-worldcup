# Whistle production stack on VPS — live TxLINE only, no demo mode.
#
# Serves web + /api + /ws via Caddy (tunnel :8088 and/or TLS :9444).
#
# Required in .env: TXLINE_API_TOKEN, ADMIN_API_KEY (≥16 chars)

services:
  api:
    build:
      context: ../..
      dockerfile: infra/playground/Dockerfile
      target: api
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL to the public HTTPS origin}
    restart: unless-stopped
    environment:
      PORT: "4000"
      NODE_ENV: production
      KEEP_SETTLE_ENABLED: "true"
      API_CORS_ORIGIN: ${API_CORS_ORIGIN:-same-origin}
      TXLINE_NETWORK: ${TXLINE_NETWORK:-devnet}
      TXLINE_API_ORIGIN: ${TXLINE_API_ORIGIN:-https://txline-dev.txodds.com}
      TXLINE_GUEST_JWT: ${TXLINE_GUEST_JWT:-}
      TXLINE_API_TOKEN: ${TXLINE_API_TOKEN:?Set TXLINE_API_TOKEN}
      ADMIN_API_KEY: ${ADMIN_API_KEY:?Set ADMIN_API_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      WHISTLE_PROGRAM_ID: ${WHISTLE_PROGRAM_ID:-}
      REQUIRE_WALLET_AUTH: ${REQUIRE_WALLET_AUTH:-true}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      NEWS_CACHE_TTL_MS: ${NEWS_CACHE_TTL_MS:-480000}
      NEWS_FETCH_TIMEOUT_MS: ${NEWS_FETCH_TIMEOUT_MS:-8000}
      NEWS_RELEVANCE_MAX_AGE_MS: ${NEWS_RELEVANCE_MAX_AGE_MS:-604800000}
      INSIGHT_MIN_POOL: ${INSIGHT_MIN_POOL:-25}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-luna}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-openai/gpt-oss-20b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      AI_REQUEST_TIMEOUT_MS: ${AI_REQUEST_TIMEOUT_MS:-12000}
      AI_CACHE_TTL_MS: ${AI_CACHE_TTL_MS:-900000}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-180}
      FORECAST_CACHE_TTL_MS: ${FORECAST_CACHE_TTL_MS:-300000}
      FORECAST_LIVE_CACHE_TTL_MS: ${FORECAST_LIVE_CACHE_TTL_MS:-30000}
      FORECAST_AI_TIMEOUT_MS: ${FORECAST_AI_TIMEOUT_MS:-6000}
      FORECAST_HISTORY_REQUESTS_PER_MIN: ${FORECAST_HISTORY_REQUESTS_PER_MIN:-6}
      FORECAST_HISTORY_TIMEOUT_MS: ${FORECAST_HISTORY_TIMEOUT_MS:-5000}
      TSDB_STATS_REQUESTS_PER_MIN: ${TSDB_STATS_REQUESTS_PER_MIN:-18}
      TSDB_STATS_TIMEOUT_MS: ${TSDB_STATS_TIMEOUT_MS:-6000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_PER_MIN: ${RATE_LIMIT_PER_MIN:-120}
    volumes:
      - whistle_api_data:/app/apps/api/data
    networks:
      - whistle
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  web:
    build:
      context: ../..
      dockerfile: infra/playground/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL to the public HTTPS origin}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_SOLANA_RPC: ${NEXT_PUBLIC_SOLANA_RPC:-https://api.devnet.solana.com}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:?Set NEXT_PUBLIC_SITE_URL to the public HTTPS origin}
      INTERNAL_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - whistle

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      VPS_PUBLIC_IP: ${VPS_PUBLIC_IP:?Set VPS_PUBLIC_IP}
      WHISTLE_TLS_PORT: ${WHISTLE_TLS_PORT:-9444}
    ports:
      - "${WHISTLE_TLS_PORT:-9444}:${WHISTLE_TLS_PORT:-9444}"
      - "127.0.0.1:8088:8088"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/hana-chat/shared/letsencrypt:/etc/letsencrypt:ro
      - whistle_caddy_data:/data
      - whistle_caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - whistle

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://caddy:8088
    depends_on:
      - caddy
    networks:
      - whistle
    profiles:
      - tunnel

networks:
  whistle:
    name: whistle-edge

volumes:
  whistle_api_data:
  whistle_caddy_data:
  whistle_caddy_config:
